            <p>不换源能用？</p>
<a id="more"></a>

<p>参考<a target="_blank" rel="noopener" href="https://docs.docker.com/engine/install/debian/">官方文档</a>，<a target="_blank" rel="noopener" href="https://developer.aliyun.com/article/110806">阿里云</a>，<a target="_blank" rel="noopener" href="https://mirrors.ustc.edu.cn/help/raspbian.html">USTC镜像帮助文档</a></p>
<h1 id="一、安装Docker-CE"><a href="#一、安装Docker-CE" class="headerlink" title="一、安装Docker CE"></a>一、安装Docker CE</h1><p>官方仍然建议用脚本安装，最方便的应该是官方脚本+阿里云镜像。</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">curl -fsSL https:&#x2F;&#x2F;get.docker.com | bash -s docker --mirror Aliyun</span><br></pre></td></tr></table></figure>

<h2 id="官方的Repository方法为什么不行"><a href="#官方的Repository方法为什么不行" class="headerlink" title="官方的Repository方法为什么不行"></a>官方的Repository方法为什么不行</h2><p>会卡在这一步</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">sudo add-apt-repository \</span><br><span class="line">   &quot;deb [arch&#x3D;armhf] https:&#x2F;&#x2F;mirrors.ustc.edu.cn&#x2F;docker-ce&#x2F;linux&#x2F;raspbian \</span><br><span class="line">   $(lsb_release -cs) \</span><br><span class="line">   stable&quot;</span><br></pre></td></tr></table></figure>
<p>看看安装脚本是怎么实现的。</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">sudo -E sh -c echo &quot;deb [arch&#x3D;armhf] https:&#x2F;&#x2F;mirrors.aliyun.com&#x2F;docker-ce&#x2F;linux&#x2F;raspbian buster stable&quot; &gt; &#x2F;etc&#x2F;apt&#x2F;sources.list.d&#x2F;docker.list</span><br></pre></td></tr></table></figure>
<p>竟然可以运行，为什么呢？</p>
<h1 id="二、配置Docker-Hub加速"><a href="#二、配置Docker-Hub加速" class="headerlink" title="二、配置Docker Hub加速"></a>二、配置Docker Hub加速</h1><p>试了几个镜像，最快的还是阿里云</p>
<figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">sudo vim /etc/docker/daemon.json</span><br></pre></td></tr></table></figure>

<figure class="highlight json"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line">&#123;</span><br><span class="line">  <span class="attr">&quot;registry-mirrors&quot;</span> : [<span class="string">&quot;http://userid.mirror.aliyuncs.com&quot;</span>]</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<figure class="highlight shell"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">sudo systemctl daemon-reload</span><br><span class="line">sudo systemctl restart docker</span><br></pre></td></tr></table></figure>
